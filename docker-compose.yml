# 在阿里云 Ubuntu 服务器上一键部署：后端(Spring Boot) + 前端(Nginx)
# 数据库使用阿里云 RDS MySQL（外部托管），请在仓库根目录 .env 中配置以下变量：
#   DB_URL        jdbc:mysql://<RDS内网地址>:3306/book_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
#   DB_USERNAME   RDS 高权限账号
#   DB_PASSWORD   RDS 账号密码
#   JWT_SECRET    强随机密钥（如：openssl rand -base64 48）
# 用法：在仓库根目录执行  docker compose up -d --build
services:
  backend:
    build: ./testBack
    container_name: bookadmin-backend
    environment:
      PORT: "8080"
      DB_URL: "${DB_URL}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
    # 仅对内部网络暴露，外面通过前端 nginx(80) 访问
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build: ./test
    container_name: bookadmin-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
