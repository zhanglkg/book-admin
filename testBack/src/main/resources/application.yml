server:
  # 云平台可注入 PORT；本地/容器默认 8080
  port: ${PORT:8080}
  servlet:
    # 与前端 Vite 代理(/api -> http://localhost:8080)保持一致
    context-path: /api

spring:
  datasource:
    # 部署时通过环境变量 DB_URL 覆盖（如指向容器/云数据库服务名或 RDS 地址）
    url: "${DB_URL:jdbc:mysql://localhost:3306/book_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}"
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 首次启动自动建表 + 写入演示数据 (schema/data 使用 IF NOT EXISTS / INSERT IGNORE,可重复启动)
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
  # LocalDateTime / LocalDate 序列化为字符串,与前端类型定义一致
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.bookadmin.modules
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  # 生产环境务必通过环境变量 JWT_SECRET 替换为足够长且随机的密钥
  secret: ${JWT_SECRET:book-admin-secret-key-please-change-in-production-1234567890}
  # 过期时间(小时)
  expire: ${JWT_EXPIRE:24}
