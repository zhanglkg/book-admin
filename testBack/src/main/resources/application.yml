server:
  port: 8080
  servlet:
    # 与前端 Vite 代理(/api -> http://localhost:8080)保持一致,接口路径与前端完全一致
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/book_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 首次启动自动建表 + 写入演示数据 (schema/data 使用 IF NOT EXISTS / INSERT IGNORE,可重复启动)
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
  # LocalDateTime / LocalDate 序列化为字符串,与前端类型定义一致
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.bookadmin.modules
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  # 生产环境请替换为足够长且随机的密钥
  secret: "book-admin-secret-key-please-change-in-production-1234567890"
  # 过期时间(小时)
  expire: 24
