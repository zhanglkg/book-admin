name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 部署到 GitHub Pages 子路径 /book-admin/
          VITE_BASE: /book-admin/
          # 默认使用本地 Mock 演示数据；在仓库 Settings -> Variables 设置
          # VITE_USE_MOCK=false 并 BACKEND_API_URL=https://<你的后端地址>/api 即可切换真实后端
          VITE_USE_MOCK: ${{ vars.VITE_USE_MOCK || 'true' }}
          VITE_API_BASE_URL: ${{ vars.BACKEND_API_URL || '/api' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: test/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
